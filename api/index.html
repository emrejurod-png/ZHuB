<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Restricted</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050508;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            color: #c8c8d4;
            overflow: hidden;
            position: relative;
        }

        /* Scan line effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        /* Subtle red vignette */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(255, 20, 40, 0.03) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 20;
            padding: 24px;
        }

        .lock-icon {
            margin-bottom: 28px;
            opacity: 0.6;
        }

        .lock-icon svg {
            width: 48px;
            height: 48px;
            stroke: #ff2a40;
            fill: none;
            stroke-width: 1.5;
            filter: drop-shadow(0 0 12px rgba(255, 42, 64, 0.2));
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            color: #ff2a40;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 16px;
            text-shadow: 0 0 20px rgba(255, 42, 64, 0.15);
        }

        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 42, 64, 0.3), transparent);
            margin: 0 auto 16px;
        }

        .message {
            font-size: 12px;
            color: #5a5a6e;
            line-height: 1.8;
            letter-spacing: 0.04em;
            max-width: 380px;
        }

        .code {
            margin-top: 32px;
            font-size: 10px;
            color: #2a2a38;
            letter-spacing: 0.08em;
        }

        /* Subtle flicker */
        @keyframes flicker {
            0%, 100% { opacity: 0.6; }
            92% { opacity: 0.6; }
            93% { opacity: 0.3; }
            94% { opacity: 0.6; }
            96% { opacity: 0.4; }
            97% { opacity: 0.6; }
        }

        .lock-icon {
            animation: flicker 5s infinite;
        }

        ::selection {
            background: rgba(255, 42, 64, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lock-icon">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <div class="title">Access Restricted</div>
        <div class="divider"></div>
        <p class="message">This endpoint is for authorized applications only.</p>
        <div class="code">ERR_403 // UNAUTHORIZED_CLIENT</div>
    </div>

        // Anti-Inspect / Anti-DevTools
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        document.addEventListener('keydown', e => {
            // F12 or F9
            if (e.key === 'F12' || e.keyCode === 123 || e.key === 'F9' || e.keyCode === 120) {
                e.preventDefault();
            }
            // Ctrl+Shift+I / J / C
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) {
                e.preventDefault();
            }
            // Ctrl+U
            if (e.ctrlKey && e.key === 'U') {
                e.preventDefault();
            }
        });

        // Debugger loop to freeze devtools if somehow opened
        setInterval(function() {
            debugger;
        }, 100);

        // Warning messages in console
        console.log("%cERR_403: UNAUTHORIZED", "color: #ff2a40; font-size: 40px; font-weight: bold; font-family: monospace;");
        console.log("%cThis endpoint is monitored. Your IP has been logged.", "color: #5a5a6e; font-size: 14px; font-family: monospace;");
    </script>
